<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commit Graph — LowPolyPhosphorus</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'MS Sans Serif', 'Microsoft Sans Serif', Tahoma, sans-serif;
  background: #000; width: 100vw; height: 100vh; overflow: hidden;
  user-select: none; cursor: default;
}
#canvas3d { display: block; width: 100vw; height: 100vh; }

#controlsWindow {
  position: fixed; bottom: 8px; right: 8px; width: 228px;
  background: #c0c0c0; border: 2px solid; border-color: #fff #404040 #404040 #fff;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.6); z-index: 100;
}
.win-titlebar {
  background: linear-gradient(90deg, #000080, #1084d0); color: #fff;
  font-size: 11px; font-weight: bold; padding: 3px 4px;
  display: flex; align-items: center; gap: 4px;
}
.win-titlebar .title-text { flex: 1; }
.win-btn {
  width: 16px; height: 14px; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold; color: #000; flex-shrink: 0;
}
.win-btn:active { border-color: #808080 #fff #fff #808080; }
.ctrl-body { padding: 6px; display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { display: block; font-size: 10px; margin-bottom: 2px; }
.ctrl-select {
  width: 100%; font-family: inherit; font-size: 11px;
  background: #fff; border: 2px inset #808080; padding: 1px 2px; cursor: pointer;
}
.ctrl-btn {
  width: 100%; padding: 3px; font-family: inherit; font-size: 11px;
  background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
  cursor: pointer; text-align: center;
}
.ctrl-btn:active { border-color: #808080 #fff #fff #808080; }
.separator { height: 1px; background: #808080; border-bottom: 1px solid #fff; margin: 2px 0; }
#legend {
  padding: 3px 6px; background: #c0c0c0; border-top: 1px solid #808080;
  font-size: 10px; display: flex; flex-wrap: wrap; gap: 3px 6px; max-height: 54px; overflow-y: auto;
}
.legend-item { display: flex; align-items: center; gap: 3px; white-space: nowrap; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
#statusBar {
  background: #c0c0c0; border-top: 1px solid #808080;
  padding: 2px 4px; font-size: 10px; display: flex; flex-wrap: wrap; gap: 3px;
}
.status-panel { border: 1px inset #808080; padding: 0 4px; height: 14px; display: flex; align-items: center; font-size: 10px; }

#tooltip {
  position: fixed; z-index: 200; pointer-events: none; display: none; width: 220px;
  background: #ffffcc; border: 2px solid; border-color: #fff #808080 #808080 #fff;
  padding: 6px; font-size: 10px; line-height: 1.5; box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}
#tooltip .tt-repo { font-weight: bold; font-size: 11px; color: #000080; }
#tooltip .tt-msg { color: #000; margin: 2px 0; }
#tooltip .tt-stat { color: #444; }
#tooltip .tt-hint { color: #808080; margin-top: 3px; font-style: italic; }

#loadOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: none; align-items: center; justify-content: center; z-index: 300;
}
#loadBox { background: #c0c0c0; border: 2px solid; border-color: #fff #404040 #404040 #fff; width: 300px; }
.load-body { padding: 12px; text-align: center; }
.load-body p { font-size: 11px; margin-bottom: 8px; }
.progress-bar { width: 100%; height: 20px; background: #fff; border: 2px inset #808080; position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: #000080; width: 0%; transition: width 0.15s; }
.progress-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 2px; color: #000; z-index:1; }
.load-btns { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
.load-btn { padding: 3px 16px; font-family: inherit; font-size: 11px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; cursor: pointer; }
.load-btn:active { border-color: #808080 #fff #fff #808080; }
.token-note { font-size: 9px; color: #444; line-height: 1.3; }

#hint { position: fixed; bottom: 10px; left: 10px; color: rgba(255,255,255,0.3); font-size: 10px; pointer-events: none; z-index: 50; }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div id="hint">drag to rotate · scroll to zoom · click node to open</div>
<div id="tooltip"></div>

<div id="controlsWindow">
  <div class="win-titlebar">
    <span class="title-text">Graph Settings</span>
    <button class="win-btn" id="ctrlMinBtn">&#8211;</button>
  </div>
  <div id="ctrlBody" class="ctrl-body">
    <div class="ctrl-group">
      <label>X Axis</label>
      <select class="ctrl-select" id="xAxis">
        <option value="date">Date</option>
        <option value="additions">Additions</option>
        <option value="deletions">Deletions</option>
        <option value="hour">Hour of Day</option>
        <option value="dow">Day of Week</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Y Axis</label>
      <select class="ctrl-select" id="yAxis">
        <option value="lines">Lines Changed</option>
        <option value="additions">Additions</option>
        <option value="deletions">Deletions</option>
        <option value="files">Files Changed</option>
        <option value="hour">Hour of Day</option>
        <option value="date">Date</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Z Axis</label>
      <select class="ctrl-select" id="zAxis">
        <option value="repo">Repository</option>
        <option value="dow">Day of Week</option>
        <option value="hour">Hour of Day</option>
        <option value="files">Files Changed</option>
        <option value="date">Date</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Node Size</label>
      <select class="ctrl-select" id="nodeSize">
        <option value="uniform">Uniform</option>
        <option value="lines">By Lines Changed</option>
        <option value="files">By Files Changed</option>
      </select>
    </div>
    <div class="separator"></div>
    <button class="ctrl-btn" onclick="rerender()">&#9654; Apply</button>
    <button class="ctrl-btn" onclick="resetCamera()">&#8634; Reset Camera</button>
    <div class="separator"></div>
    <div class="ctrl-group">
      <label>GitHub Username</label>
      <input type="text" id="usernameInput" class="ctrl-select" value="LowPolyPhosphorus" placeholder="username">
    </div>
    <div class="ctrl-group">
      <label>Token (optional — avoids rate limits)</label>
      <input type="password" id="tokenInput" class="ctrl-select" placeholder="ghp_...">
      <div class="token-note" style="margin-top:2px">Generate at github.com/settings/tokens — no scopes needed for public repos</div>
    </div>
    <button class="ctrl-btn" onclick="loadData()">&#128257; Load Commits</button>
    <div class="separator"></div>
    <div id="legend"></div>
    <div id="statusBar">
      <div class="status-panel" id="statusCommits">Sample data</div>
      <div class="status-panel" id="statusAxes">X:Date Y:Lines Z:Repo</div>
    </div>
  </div>
</div>

<div id="loadOverlay">
  <div id="loadBox">
    <div class="win-titlebar"><span class="title-text">&#128257; Fetching commits...</span></div>
    <div class="load-body">
      <p id="loadMsg">Contacting GitHub API...</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
      <div class="load-btns">
        <button class="load-btn" onclick="cancelLoad()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let commits = [], spheres = [], axisObjects = [];
let repoColors = {}, repoList = [];
let scene, camera, renderer, raycaster;
let isDragging = false, dragMoved = false, lastMouse = {x:0,y:0};
let rotX = 0.3, rotY = 0.5;
let cancelFetch = false, ctrlMinimized = false;
const mouse2d = new THREE.Vector2(-9999,-9999);
const COLORS = [0xff8c00,0x00aaff,0xff4488,0x44ff88,0xffdd00,0xaa44ff,0xff6644,0x44ffdd,0xff44aa,0x88ff44];

// rotation pivot group — everything data lives in here
let pivot;

function initThree() {
  const canvas = document.getElementById('canvas3d');
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000);
  resize();

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 22);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(5,8,5); scene.add(dl);

  pivot = new THREE.Group();
  scene.add(pivot);

  raycaster = new THREE.Raycaster();
  raycaster.params.Mesh = {};

  const canvas3d = document.getElementById('canvas3d');
  canvas3d.addEventListener('mousemove', onMouseMove);
  canvas3d.addEventListener('mousedown', e => { isDragging=true; dragMoved=false; lastMouse={x:e.clientX,y:e.clientY}; });
  canvas3d.addEventListener('mouseup', () => isDragging=false);
  canvas3d.addEventListener('mouseleave', () => { isDragging=false; hideTooltip(); });
  canvas3d.addEventListener('click', onCanvasClick);
  canvas3d.addEventListener('wheel', e => {
    camera.position.z = Math.max(4, Math.min(45, camera.position.z + e.deltaY*0.025));
  }, {passive:true});
  window.addEventListener('resize', resize);
  animate();
}

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  if(camera) { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); }
}

function animate() { requestAnimationFrame(animate); renderer.render(scene,camera); }

function onMouseMove(e) {
  const rect = e.target.getBoundingClientRect();
  mouse2d.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse2d.y = -((e.clientY-rect.top)/rect.height)*2+1;

  if(isDragging) {
    const dx=e.clientX-lastMouse.x, dy=e.clientY-lastMouse.y;
    if(Math.abs(dx)>1||Math.abs(dy)>1) dragMoved=true;
    rotY+=dx*0.005; rotX+=dy*0.005;
    rotX=Math.max(-1.4,Math.min(1.4,rotX));
    lastMouse={x:e.clientX,y:e.clientY};
    pivot.rotation.x = rotX;
    pivot.rotation.y = rotY;
    hideTooltip(); return;
  }

  raycaster.setFromCamera(mouse2d, camera);
  const meshes = spheres.map(s=>s.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if(hits.length) {
    const s = spheres.find(s=>s.mesh===hits[0].object);
    if(s) { document.body.style.cursor='pointer'; showTooltip(s.commit, e.clientX, e.clientY); return; }
  }
  document.body.style.cursor='default';
  hideTooltip();
}

function onCanvasClick() {
  if(dragMoved) { dragMoved=false; return; }
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(spheres.map(s=>s.mesh));
  if(hits.length) {
    const s = spheres.find(s=>s.mesh===hits[0].object);
    if(s?.commit?.url) window.open(s.commit.url,'_blank');
  }
}

function showTooltip(c, mx, my) {
  const tt = document.getElementById('tooltip');
  const msg = c.message.length>55 ? c.message.slice(0,55)+'...' : c.message;
  const date = c.date ? new Date(c.date).toLocaleDateString()+' '+new Date(c.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
  tt.innerHTML =
    `<div class="tt-repo">${c.repo}</div>` +
    `<div class="tt-msg">${msg}</div>` +
    `<div class="tt-stat">${date}</div>` +
    `<div class="tt-stat">+${c.additions} / -${c.deletions} lines &nbsp;·&nbsp; ${c.files} files</div>` +
    `<div class="tt-hint">click to open on GitHub</div>`;
  let tx=mx+14, ty=my-10;
  if(tx+224>window.innerWidth) tx=mx-236;
  if(ty+110>window.innerHeight) ty=my-115;
  tt.style.left=tx+'px'; tt.style.top=ty+'px'; tt.style.display='block';
}

function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

// ---- axis helpers ----
function getVal(c, axis) {
  if(axis==='date')      return new Date(c.date).getTime();
  if(axis==='additions') return c.additions;
  if(axis==='deletions') return c.deletions;
  if(axis==='lines')     return c.additions+c.deletions;
  if(axis==='files')     return c.files;
  if(axis==='hour')      return new Date(c.date).getHours();
  if(axis==='dow')       return new Date(c.date).getDay();
  if(axis==='repo')      return repoList.indexOf(c.repo);
  return 0;
}

function normalize(vals, spread) {
  const mn=Math.min(...vals), mx=Math.max(...vals), range=mx-mn||1;
  return vals.map(v=>((v-mn)/range)*spread*2-spread);
}

function buildAxes(xLabel, yLabel, zLabel) {
  // clear old axis objects from pivot
  axisObjects.forEach(o=>pivot.remove(o));
  axisObjects=[];

  const S=9;
  const axisData = [
    {dir:[1,0,0], color:0xff4444, label:xLabel},
    {dir:[0,1,0], color:0x44ff44, label:yLabel},
    {dir:[0,0,1], color:0x4444ff, label:zLabel},
  ];

  axisData.forEach(({dir,color,label})=>{
    const pts=[new THREE.Vector3(...dir.map(v=>v*-S)), new THREE.Vector3(...dir.map(v=>v*S))];
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.5}));
    pivot.add(line); axisObjects.push(line);

    // tick marks
    for(let t=-S;t<=S;t+=2) {
      const tickPts=[];
      if(dir[0]) tickPts.push(new THREE.Vector3(t,-0.15,0),new THREE.Vector3(t,0.15,0));
      if(dir[1]) tickPts.push(new THREE.Vector3(-0.15,t,0),new THREE.Vector3(0.15,t,0));
      if(dir[2]) tickPts.push(new THREE.Vector3(0,-0.15,t),new THREE.Vector3(0,0.15,t));
      const tg=new THREE.BufferGeometry().setFromPoints(tickPts);
      const tl=new THREE.Line(tg,new THREE.LineBasicMaterial({color:0x333333}));
      pivot.add(tl); axisObjects.push(tl);
    }

    // grid plane (XZ)
    if(dir[1]) {
      const grid=new THREE.GridHelper(S*2,9,0x1c1c1c,0x1c1c1c);
      pivot.add(grid); axisObjects.push(grid);
    }
  });
}

// ---- data fetch ----
function authHeaders() {
  const tok = document.getElementById('tokenInput').value.trim();
  const h = {'Accept':'application/vnd.github.v3+json'};
  if(tok) h['Authorization']='token '+tok;
  return h;
}

function setProgress(pct,msg) {
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=Math.round(pct)+'%';
  if(msg) document.getElementById('loadMsg').textContent=msg;
}
function cancelLoad() { cancelFetch=true; document.getElementById('loadOverlay').style.display='none'; }

async function loadData() {
  const username = document.getElementById('usernameInput').value.trim();
  if(!username) return;
  cancelFetch=false; commits=[];
  document.getElementById('progressFill').style.background='#000080';
  document.getElementById('loadOverlay').style.display='flex';
  setProgress(0,'Fetching repos...');

  try {
    const rRes = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=pushed&type=owner`, {headers:authHeaders()});
    if(!rRes.ok) {
      const remaining = rRes.headers.get('X-RateLimit-Remaining');
      if(remaining==='0') throw new Error('Rate limited (60 req/hr unauthenticated). Add a token to continue.');
      throw new Error(`${rRes.status} ${rRes.statusText}`);
    }
    const repos = await rRes.json();
    if(!Array.isArray(repos)) throw new Error('Unexpected response — check username');

    const ownRepos = repos.filter(r=>!r.fork).slice(0,15);
    setProgress(5,`Found ${ownRepos.length} repos — fetching commits...`);

    for(let ri=0; ri<ownRepos.length; ri++) {
      if(cancelFetch) return;
      const repo=ownRepos[ri];
      setProgress(5+(ri/ownRepos.length)*90,`${repo.name}...`);
      try {
        const cRes=await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?per_page=25&author=${username}`,{headers:authHeaders()});
        if(!cRes.ok) continue;
        const cs=await cRes.json();
        if(!Array.isArray(cs)) continue;

        for(const c of cs.slice(0,20)) {
          if(cancelFetch) return;
          let additions=0,deletions=0,files=0;
          try {
            const dRes=await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits/${c.sha}`,{headers:authHeaders()});
            if(dRes.ok) { const d=await dRes.json(); additions=d.stats?.additions||0; deletions=d.stats?.deletions||0; files=d.files?.length||0; }
          } catch(e){}
          commits.push({
            sha:c.sha.slice(0,7), message:c.commit?.message?.split('\n')[0]||'',
            date:c.commit?.author?.date||'', repo:repo.name, url:c.html_url,
            additions, deletions, files,
          });
        }
      } catch(e){}
    }

    setProgress(100,`Done — ${commits.length} commits loaded`);
    setTimeout(()=>{ document.getElementById('loadOverlay').style.display='none'; rerender(); },500);

  } catch(err) {
    document.getElementById('progressFill').style.background='#cc0000';
    document.getElementById('loadMsg').textContent='Error: '+err.message;
  }
}

// ---- render ----
function rerender() {
  // clear spheres and axes from pivot
  spheres.forEach(s=>pivot.remove(s.mesh));
  spheres=[];
  axisObjects.forEach(o=>pivot.remove(o));
  axisObjects=[];

  if(!commits.length) { loadSampleData(); return; }

  const xAxis=document.getElementById('xAxis').value;
  const yAxis=document.getElementById('yAxis').value;
  const zAxis=document.getElementById('zAxis').value;
  const nodeSz=document.getElementById('nodeSize').value;

  repoList=[...new Set(commits.map(c=>c.repo))];
  repoColors={}; repoList.forEach((r,i)=>repoColors[r]=COLORS[i%COLORS.length]);

  const rawX=commits.map(c=>getVal(c,xAxis));
  const rawY=commits.map(c=>getVal(c,yAxis));
  const rawZ=commits.map(c=>getVal(c,zAxis));

  const posX=normalize(rawX,8);
  const posY=normalize(rawY,5);
  const posZ=normalize(rawZ,7);

  const axisName=a=>({date:'Date',additions:'Additions',deletions:'Deletions',lines:'Lines Changed',
    files:'Files',hour:'Hour',dow:'Weekday',repo:'Repo'}[a]||a);

  buildAxes(axisName(xAxis), axisName(yAxis), axisName(zAxis));

  // reset rotation
  rotX=0.3; rotY=0.4;
  pivot.rotation.x=rotX; pivot.rotation.y=rotY;

  commits.forEach((c,i)=>{
    const linesChanged=c.additions+c.deletions;
    const maxLines=Math.max(...commits.map(x=>x.additions+x.deletions))||1;
    const maxFiles=Math.max(...commits.map(x=>x.files))||1;
    const size = nodeSz==='lines' ? Math.max(0.08,Math.min(0.38,(linesChanged/maxLines)*0.38))
                : nodeSz==='files'? Math.max(0.08,Math.min(0.38,(c.files/maxFiles)*0.38))
                : 0.13;

    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(size,8,8),
      new THREE.MeshLambertMaterial({color:repoColors[c.repo],transparent:true,opacity:0.88})
    );
    mesh.position.set(posX[i], posY[i], posZ[i]);
    pivot.add(mesh);
    spheres.push({mesh,commit:c});
  });

  // legend & status
  document.getElementById('legend').innerHTML=repoList.map(r=>{
    const h=repoColors[r].toString(16).padStart(6,'0');
    return `<span class="legend-item"><span class="legend-dot" style="background:#${h}"></span>${r}</span>`;
  }).join('');
  document.getElementById('statusCommits').textContent=`${commits.length} commits · ${repoList.length} repos`;
  document.getElementById('statusAxes').textContent=`X:${axisName(xAxis)} Y:${axisName(yAxis)} Z:${axisName(zAxis)}`;
}

function resetCamera() { camera.position.set(0,0,22); rotX=0.3; rotY=0.4; pivot.rotation.x=rotX; pivot.rotation.y=rotY; }

function loadSampleData() {
  const repos=['ratgenie','FuturaLink','portfolio','dotfiles'];
  const now=Date.now();
  for(let i=0;i<90;i++){
    const repo=repos[Math.floor(Math.random()*repos.length)];
    commits.push({
      sha:Math.random().toString(16).slice(2,9),
      message:['fix bug','add feature','refactor','initial commit','update readme','cleanup','wip','hotfix'][Math.floor(Math.random()*8)],
      date:new Date(now-Math.random()*365*24*3600*1000).toISOString(),
      repo, url:`https://github.com/LowPolyPhosphorus/${repo}`,
      additions:Math.floor(Math.random()*300), deletions:Math.floor(Math.random()*150), files:Math.floor(Math.random()*12)+1,
    });
  }
  rerender();
}

document.getElementById('ctrlMinBtn').onclick=()=>{
  ctrlMinimized=!ctrlMinimized;
  document.getElementById('ctrlBody').style.display=ctrlMinimized?'none':'flex';
  document.getElementById('ctrlMinBtn').textContent=ctrlMinimized?'+':'–';
};

initThree();
loadSampleData();
</script>
</body>
</html>
